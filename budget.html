<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Search - PakCarPrice</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style2.css">
</head>
<body>

   
    <nav class="navbar">
        <div class="nav-logo">🚗 PakCarPrice</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="predict.html">Predict Price</a></li>
            
            <li><a href="budget.html" class="active">Budget Search</a></li>
          
        </ul>
    </nav>

  
    <div class="page-title">
        <h1>Search Cars in your Budget</h1>
        <p>Enter your budget range and find all available cars in Pakistan</p>
    </div>

    
    <div class="budget-wrapper">
        <div class="budget-form">

           
            <div class="form-row">
                <div class="form-group">
                    <label for="min-price">Min Price (Lakhs)</label>
                    <input type="number" id="min-price" placeholder="e.g. 10" min="1">
                </div>
                <div class="form-group">
                    <label for="max-price">Max Price (Lakhs)</label>
                    <input type="number" id="max-price" placeholder="e.g. 30" min="1">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="budget-city">City (Optional)</label>
                    <select id="budget-city">
                        <option value="">Any City</option>
                        <option>Karachi</option>
                        <option>Lahore</option>
                        <option>Islamabad</option>
                        <option>Rawalpindi</option>
                        <option>Peshawar</option>
                        <option>Quetta</option>
                        <option>Faisalabad</option>
                        <option>Multan</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="budget-transmission">Transmission (Optional)</label>
                    <select id="budget-transmission">
                        <option value="">Any</option>
                        <option>Manual</option>
                        <option>Automatic</option>
                    </select>
                </div>
            </div>

            <button class="btn-search" onclick="searchByBudget()">🔍 Search Cars</button>
        </div>

        <div id="results-section" class="results-section" style="display:none;">
            <div class="results-header">
                <h2>Results</h2>
                <span id="results-count" class="results-count"></span>
            </div>

           
            <div id="loading" class="loading" style="display:none;">
                <div class="spinner"></div>
                <p>Searching cars...</p>
            </div>

            
            <div id="cars-grid" class="cars-grid"></div>

            <div id="no-results" class="no-results" style="display:none;">
                
                <p>No cars found in this budget range.</p>
                <small>Try widening your price range.</small>
            </div>
        </div>

    </div>

 

    <script src="budget.js"></script>
</body>
</html>
